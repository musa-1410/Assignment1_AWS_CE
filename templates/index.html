<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniEvent - Campus Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a; /* Dark academic blue/gray */
            --accent-color: #3b82f6; /* Bright blue for accents */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-main);
        }

        /* Header Styling */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            border-bottom: 4px solid var(--accent-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.75rem;
            letter-spacing: -0.025em;
        }

        header p {
            margin-top: 0.75rem;
            color: #cbd5e1;
            font-size: 1.15rem;
            font-weight: 400;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        /* Responsive Grid for Cards */
        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        /* Individual Event Card */
        .event-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Poster Image Styling */
        .event-image {
            width: 100%;
            height: 220px;
            object-fit: cover; /* Prevents image distortion */
            border-bottom: 1px solid #e2e8f0;
        }

        /* Text Content within Card */
        .event-details {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .event-details h2 {
            margin: 0 0 1rem 0;
            font-size: 1.25rem;
            color: var(--text-main);
            line-height: 1.4;
        }

        .event-meta {
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        .event-meta strong {
            color: var(--text-main);
            margin-right: 0.5rem;
        }

        /* Little visual badge at the bottom of the card */
        .badge {
            display: inline-block;
            background-color: #eff6ff;
            color: var(--accent-color);
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: auto; /* Pushes the badge to the bottom */
            align-self: flex-start;
            border: 1px solid #bfdbfe;
        }
    </style>
</head>
<body>

    <header>
        <h1>UniEvent</h1>
        <p>Your Central Hub for Official Campus Activities</p>
    </header>
    
    <div class="container">
        <div class="event-grid">
            {% for event in events %}
            <div class="event-card">
                <img class="event-image" src="{{ event.image }}" alt="{{ event.title }} Poster">
                <div class="event-details">
                    <h2>{{ event.title }}</h2>
                    <div class="event-meta">
                        <strong>Date:</strong> {{ event.date }}
                    </div>
                    <div class="event-meta">
                        <strong>Venue:</strong> {{ event.venue }}
                    </div>
                    <span class="badge">Official Event</span>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
